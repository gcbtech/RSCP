<!DOCTYPE html>
<html>

<head>
    <title>{{ org_name or 'RSCP' }} | Customer Display</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" href="{{ favicon }}">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        .display-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1rem;
        }

        .header {
            text-align: center;
            padding: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .cart-area {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-name {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .cart-item-qty {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .cart-item-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4ade80;
        }

        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-cart .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .totals-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem 1.5rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            font-size: 1.25rem;
        }

        .total-row.discount-row {
            color: #fbbf24;
        }

        .total-row.grand-total {
            font-size: 2rem;
            font-weight: 700;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            padding-top: 0.5rem;
            margin-top: 0.25rem;
        }

        .total-row.cash-total {
            font-size: 2.5rem;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            margin-top: 0.25rem;
        }

        .total-row.cash-total .amount {
            color: #22c55e;
        }

        .grand-total .amount {
            color: #4ade80;
        }

        .connection-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: default;
            user-select: none;
        }

        .exit-controls {
            position: fixed;
            top: 3.5rem;
            right: 1rem;
            z-index: 10000;
            display: none;
        }

        .exit-controls.visible {
            display: block;
        }

        .exit-btn {
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .connected {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .disconnected {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        /* Disconnection overlay - blocks all interaction */
        .disconnect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .disconnect-overlay .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #f87171;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .disconnect-overlay h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .disconnect-overlay .status-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .disconnect-overlay .retry-count {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="display-container">
        <div class="header">
            <h1>{{ org_name or 'Welcome' }}</h1>
        </div>

        <div class="cart-area" id="cartItems">
            <div class="empty-cart" id="emptyState">
                <div class="icon">🛒</div>
                <div>Waiting for items...</div>
            </div>
        </div>

        <div class="totals-area">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="total-row discount-row" id="discountRow" style="display: none;">
                <span>Discount</span>
                <span id="discount">-$0.00</span>
            </div>
            <div class="total-row" id="taxRow">
                <span id="taxLabel">Tax</span>
                <span id="tax">$0.00</span>
            </div>
            <!-- Cash total only shown when cash discount enabled -->
            <div class="total-row grand-total cash-total" id="cashTotalRow" style="display: none;">
                <span>💵 Cash</span>
                <span class="amount" id="cashTotal">$0.00</span>
            </div>
            <!-- Card total (or just Total if no cash discount) -->
            <div class="total-row grand-total" id="cardTotalRow">
                <span id="cardTotalLabel">Total</span>
                <span class="amount" id="cardTotal">$0.00</span>
            </div>
        </div>
    </div>

    <div class="connection-status disconnected" id="connectionStatus">
        ⚪ Connecting...
    </div>

    <!-- Hidden staff escape: triple-click status badge to reveal -->
    <div class="exit-controls" id="exitControls">
        <button class="exit-btn" onclick="unpairAndExit()">🔓 Unpair & Exit</button>
    </div>

    <!-- Disconnection overlay (hidden by default) -->
    <div class="disconnect-overlay" id="disconnectOverlay" style="display: none;">
        <div class="spinner"></div>
        <h2>⚠️ Display Disconnected</h2>
        <div class="status-text" id="recoveryStatus">Attempting to reconnect...</div>
        <div class="retry-count" id="retryCount"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const sessionCode = '{{ session_code }}';
        const csrfToken = '{{ csrf_token() }}';
        let socket;
        let pollingInterval = null;
        let lastCartHash = '';
        let consecutiveFailures = 0;
        const MAX_FAILURES_BEFORE_RECOVERY = 3;
        let isRecovering = false;
        let recoveryAttempts = 0;

        // Persist pairing info in localStorage for auto-recovery
        function savePairingInfo() {
            localStorage.setItem('rscp_customer_display', JSON.stringify({
                session_code: sessionCode,
                terminal_id: getTerminalId(),
                timestamp: Date.now()
            }));
        }

        function getTerminalId() {
            let id = localStorage.getItem('rscp_terminal_id');
            if (!id) {
                id = 'term_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('rscp_terminal_id', id);
            }
            return id;
        }

        function clearPairingInfo() {
            localStorage.removeItem('rscp_customer_display');
        }

        // Save pairing info on load (we're successfully on the customer display)
        savePairingInfo();

        function formatPrice(amount) {
            return '$' + (parseFloat(amount) || 0).toFixed(2);
        }

        function updateCartDisplay(cart) {
            const cartArea = document.getElementById('cartItems');
            const items = cart.items || [];

            if (items.length === 0) {
                cartArea.innerHTML = `
                    <div class="empty-cart">
                        <div class="icon">🛒</div>
                        <div>Waiting for items...</div>
                    </div>
                `;
                document.getElementById('subtotal').textContent = '$0.00';
                document.getElementById('discount').textContent = '-$0.00';
                document.getElementById('discountRow').style.display = 'none';
                document.getElementById('tax').textContent = '$0.00';
                document.getElementById('taxLabel').textContent = 'Tax';
                document.getElementById('cardTotal').textContent = '$0.00';
                document.getElementById('cardTotalLabel').textContent = 'Total';
                document.getElementById('cashTotalRow').style.display = 'none';
                return;
            }

            // Build items HTML
            let html = '';
            items.forEach(item => {
                const lineTotal = parseFloat(item.line_total) || 0;
                html += `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-name">${escapeHtml(item.name)}</div>
                            <div class="cart-item-qty">${item.quantity}x @ ${formatPrice(item.unit_price)}</div>
                        </div>
                        <div class="cart-item-price">${formatPrice(lineTotal)}</div>
                    </div>
                `;
            });
            cartArea.innerHTML = html;

            // Use server-computed totals
            document.getElementById('subtotal').textContent = formatPrice(cart.subtotal);

            // Discount row (order + coupon)
            const totalDiscount = (cart.order_discount || 0) + (cart.coupon_discount || 0);
            document.getElementById('discount').textContent = '-' + formatPrice(totalDiscount);
            document.getElementById('discountRow').style.display = totalDiscount > 0 ? 'flex' : 'none';

            // Tax
            document.getElementById('taxLabel').textContent = 'Tax (' + (cart.tax_rate_pct || 0).toFixed(2) + '%)';
            document.getElementById('tax').textContent = formatPrice(cart.tax_amount);

            // Dual pricing: Cash vs Card
            if (cart.cash_discount_enabled && cart.cash_discount_value > 0) {
                // Show both prices
                document.getElementById('cardTotalLabel').textContent = '💳 Card';
                document.getElementById('cardTotal').textContent = formatPrice(cart.card_total);
                document.getElementById('cashTotalRow').style.display = 'flex';
                document.getElementById('cashTotal').textContent = formatPrice(cart.cash_total);
            } else {
                // Just show total
                document.getElementById('cardTotalLabel').textContent = 'Total';
                document.getElementById('cardTotal').textContent = formatPrice(cart.card_total);
                document.getElementById('cashTotalRow').style.display = 'none';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== DISCONNECTION DETECTION & AUTO-RECOVERY =====

        function showDisconnectOverlay(statusText) {
            const overlay = document.getElementById('disconnectOverlay');
            overlay.style.display = 'flex';
            document.getElementById('recoveryStatus').textContent = statusText || 'Attempting to reconnect...';
        }

        function hideDisconnectOverlay() {
            document.getElementById('disconnectOverlay').style.display = 'none';
        }

        function updateRecoveryStatus(text) {
            document.getElementById('recoveryStatus').textContent = text;
            document.getElementById('retryCount').textContent = 'Attempt ' + recoveryAttempts;
        }

        async function attemptAutoRecovery() {
            if (isRecovering) return;
            isRecovering = true;
            recoveryAttempts = 0;

            // Stop polling during recovery
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            showDisconnectOverlay('Reconnecting to session...');

            // Retry loop: try to re-pair up to 100 times (covers ~10 minutes with backoff)
            while (recoveryAttempts < 100) {
                recoveryAttempts++;
                updateRecoveryStatus('Re-pairing to session ' + sessionCode + '...');

                try {
                    // First, try fetching the cart directly — maybe we're still authenticated
                    const checkResp = await fetch('/pos/api/shared-cart/' + sessionCode, {
                        credentials: 'include'
                    });

                    if (checkResp.ok) {
                        const checkData = await checkResp.json();
                        if (checkData.success) {
                            // Session is still valid! We just had a temporary blip
                            console.log('Recovery: session still valid, resuming polling');
                            consecutiveFailures = 0;
                            isRecovering = false;
                            hideDisconnectOverlay();
                            startPolling();
                            return;
                        }
                    }

                    // If cart fetch failed (401/404), try to rejoin the session
                    const pairResp = await fetch('/pos/terminal/rejoin', {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify({
                            session_code: sessionCode,
                            terminal_type: 'customer',
                            terminal_id: getTerminalId()
                        })
                    });

                    if (pairResp.ok) {
                        const pairData = await pairResp.json();
                        if (pairData.success) {
                            console.log('Recovery: successfully rejoined!');
                            consecutiveFailures = 0;
                            isRecovering = false;
                            hideDisconnectOverlay();
                            // Reload page to get fresh server-side session state
                            window.location.href = '/pos/customer-display';
                            return;
                        }
                    }

                    // Check if session no longer exists (main terminal closed it)
                    if (pairResp.status === 404) {
                        updateRecoveryStatus('Session ended. Waiting for new session...');
                    }

                } catch (err) {
                    console.error('Recovery attempt failed:', err);
                    updateRecoveryStatus('Connection error. Retrying...');
                }

                // Backoff: wait before retrying (2s first few, then 5s, then 10s)
                const delay = recoveryAttempts <= 3 ? 2000 : (recoveryAttempts <= 10 ? 5000 : 10000);
                await new Promise(resolve => setTimeout(resolve, delay));
            }

            // After all retries exhausted, show permanent message
            updateRecoveryStatus('Unable to reconnect. Please re-pair manually.');
            document.getElementById('retryCount').innerHTML = '<a href="/pos/pair?type=customer" style="color: #60a5fa;">Go to Pairing Page</a>';
            isRecovering = false;
        }

        // Polling with failure detection
        function pollCart() {
            fetch('/pos/api/shared-cart/' + sessionCode, {
                credentials: 'include'
            })
                .then(response => {
                    if (!response.ok) {
                        // Auth failure (302 redirect to login, or 401, or 404 session gone)
                        consecutiveFailures++;
                        console.warn('Poll failed (status ' + response.status + '), failure #' + consecutiveFailures);

                        if (consecutiveFailures >= MAX_FAILURES_BEFORE_RECOVERY) {
                            console.error('Too many consecutive failures, starting auto-recovery');
                            attemptAutoRecovery();
                        }
                        return null;
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) return; // Failed response handled above

                    if (data.success) {
                        // Reset failure counter on success
                        consecutiveFailures = 0;

                        // Only update if cart changed
                        const cartHash = JSON.stringify(data.cart);
                        if (cartHash !== lastCartHash) {
                            lastCartHash = cartHash;
                            updateCartDisplay(data.cart);
                        }
                    } else {
                        // API returned success: false (session not found)
                        consecutiveFailures++;
                        if (consecutiveFailures >= MAX_FAILURES_BEFORE_RECOVERY) {
                            attemptAutoRecovery();
                        }
                    }
                })
                .catch(err => {
                    consecutiveFailures++;
                    console.error('Poll error:', err);
                    if (consecutiveFailures >= MAX_FAILURES_BEFORE_RECOVERY) {
                        attemptAutoRecovery();
                    }
                });
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            // Poll every 500ms for near real-time updates
            pollingInterval = setInterval(pollCart, 500);
            pollCart(); // Initial fetch

            document.getElementById('connectionStatus').className = 'connection-status connected';
            document.getElementById('connectionStatus').textContent = '🟢 Syncing';
        }

        function connectWebSocket() {
            // Check if Socket.IO is available
            if (typeof io === 'undefined') {
                console.warn('Socket.IO not available, using polling');
                startPolling();
                return;
            }

            try {
                socket = io({
                    transports: ['websocket', 'polling'],
                    timeout: 5000
                });

                socket.on('connect', () => {
                    console.log('WebSocket connected');
                    document.getElementById('connectionStatus').className = 'connection-status connected';
                    document.getElementById('connectionStatus').textContent = '🟢 Live';

                    // Stop polling if it was running
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                    }

                    // Join the session room
                    socket.emit('join_session', { session_code: sessionCode });
                });

                socket.on('disconnect', () => {
                    console.log('WebSocket disconnected, falling back to polling');
                    document.getElementById('connectionStatus').className = 'connection-status disconnected';
                    document.getElementById('connectionStatus').textContent = '🔄 Reconnecting...';
                    startPolling();
                });

                socket.on('connect_error', (err) => {
                    console.log('WebSocket connection error, using polling:', err);
                    startPolling();
                });

                socket.on('cart_update', (data) => {
                    console.log('Cart update received via WebSocket, fetching computed totals');
                    // WebSocket only notifies of change - fetch computed totals from API
                    fetch('/pos/api/shared-cart/' + sessionCode, { credentials: 'include' })
                        .then(response => response.json())
                        .then(apiData => {
                            if (apiData.success) {
                                consecutiveFailures = 0;
                                updateCartDisplay(apiData.cart);
                            }
                        })
                        .catch(err => console.error('Error fetching cart:', err));
                });

                socket.on('session_closed', (data) => {
                    // Don't alert — just show overlay and wait for new session
                    showDisconnectOverlay('Session ended. Waiting for new session...');
                    // Start recovery to automatically reconnect when a new session starts
                    attemptAutoRecovery();
                });

                // If not connected after 3 seconds, fall back to polling
                setTimeout(() => {
                    if (!socket.connected) {
                        console.log('WebSocket timeout, using polling');
                        startPolling();
                    }
                }, 3000);

            } catch (e) {
                console.error('WebSocket error:', e);
                startPolling();
            }
        }

        // Connect on page load
        connectWebSocket();

        // ===== STAFF ESCAPE: Triple-click status badge to reveal exit button =====
        let clickCount = 0;
        let clickTimer = null;
        document.getElementById('connectionStatus').addEventListener('click', function () {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 600);

            if (clickCount >= 3) {
                clickCount = 0;
                const exitControls = document.getElementById('exitControls');
                exitControls.classList.toggle('visible');
            }
        });

        function unpairAndExit() {
            // Stop all polling/websocket
            if (pollingInterval) clearInterval(pollingInterval);
            if (socket) socket.disconnect();

            fetch('/pos/terminal/unpair', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ terminal_id: getTerminalId() })
            })
            .then(() => {
                clearPairingInfo();
                localStorage.removeItem('rscp_terminal_pairing');
                window.location.href = '/pos/';
            })
            .catch(() => {
                // Even if unpair fails, clear local state and redirect
                clearPairingInfo();
                localStorage.removeItem('rscp_terminal_pairing');
                window.location.href = '/pos/';
            });
        }
    </script>
</body>

</html>
