<!DOCTYPE html>
<html>

<head>
    <title>RSCP | POS Locked</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" href="{{ favicon }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --pos-primary: #2563eb;
            --pos-bg: #1e3a5f;
        }

        body {
            background: linear-gradient(135deg, var(--pos-bg) 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .lock-container {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .lock-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .lock-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .lock-subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .pin-display {
            font-size: 2rem;
            letter-spacing: 0.75rem;
            background: #f1f5f9;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-family: monospace;
            min-height: 60px;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .pin-btn {
            padding: 1.25rem;
            font-size: 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #f1f5f9;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s;
        }

        .pin-btn:hover {
            background: #e2e8f0;
            transform: scale(1.05);
        }

        .pin-btn:active {
            transform: scale(0.95);
        }

        .pin-btn.action {
            background: var(--pos-primary);
            color: white;
        }

        .pin-btn.action:hover {
            background: #1d4ed8;
        }

        .pin-btn.clear {
            background: #ef4444;
            color: white;
        }

        .pin-btn.clear:hover {
            background: #dc2626;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #94a3b8;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.875rem;
        }

        .badge-input {
            font-size: 1.25rem;
            padding: 1rem;
            text-align: center;
            border-radius: 10px;
        }

        .logout-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: inline-block;
        }

        .logout-link:hover {
            color: #ef4444;
        }

        .alert {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="lock-container">
        <div class="lock-icon">🔒</div>
        <h1 class="lock-title">POS Locked</h1>
        <p class="lock-subtitle">Locked by: {{ locked_by }}</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">
            {% for msg in messages %}{{ msg }}{% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" id="unlockForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <input type="password" name="pin" id="pinInput" class="form-control badge-input" placeholder="Enter PIN"
                    maxlength="6" autocomplete="off" inputmode="numeric"
                    style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem;">
            </div>

            <div class="pin-pad">
                <button type="button" class="pin-btn" onclick="addDigit('1')">1</button>
                <button type="button" class="pin-btn" onclick="addDigit('2')">2</button>
                <button type="button" class="pin-btn" onclick="addDigit('3')">3</button>
                <button type="button" class="pin-btn" onclick="addDigit('4')">4</button>
                <button type="button" class="pin-btn" onclick="addDigit('5')">5</button>
                <button type="button" class="pin-btn" onclick="addDigit('6')">6</button>
                <button type="button" class="pin-btn" onclick="addDigit('7')">7</button>
                <button type="button" class="pin-btn" onclick="addDigit('8')">8</button>
                <button type="button" class="pin-btn" onclick="addDigit('9')">9</button>
                <button type="button" class="pin-btn clear" onclick="clearPin()">C</button>
                <button type="button" class="pin-btn" onclick="addDigit('0')">0</button>
                <button type="button" class="pin-btn action" onclick="submitPin()">✓</button>
            </div>

            <div class="divider"><span>or scan badge</span></div>

            <input type="text" name="badge_id" class="form-control badge-input" placeholder="Scan Badge ID"
                id="badgeInput" autocomplete="off">
        </form>

        <a href="{{ url_for('pos.pos_logout') }}" class="logout-link">🚪 Logout & Return to Main Menu</a>
    </div>

    <script>
        function addDigit(digit) {
            const pinInput = document.getElementById('pinInput');
            if (pinInput.value.length < 6) {
                pinInput.value += digit;
            }
        }

        function clearPin() {
            document.getElementById('pinInput').value = '';
        }

        function submitPin() {
            const pin = document.getElementById('pinInput').value;
            if (pin.length >= 4) {
                document.getElementById('unlockForm').submit();
            }
        }

        // Auto-submit on badge scan (enter key)
        document.getElementById('badgeInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('unlockForm').submit();
            }
        });

        // Submit PIN on Enter key
        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitPin();
            }
        });

        // Focus PIN input on load
        document.getElementById('pinInput').focus();
    </script>
</body>

</html>
