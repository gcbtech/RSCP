<!DOCTYPE html>
<html>

<head>
    <title>RSCP | Manager Auth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" href="{{ favicon }}">
    <style>
        body {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .auth-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="auth-icon">🔐</div>
        <h2>Manager Authentication</h2>
        <p class="text-muted">Refund access requires manager credentials</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('pos.refund_auth') }}" method="POST" class="text-start mt-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label">Manager Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password or PIN</label>
                <input type="password" name="password" class="form-control" placeholder="Password">
                <div class="text-center my-2 text-muted">— or —</div>
                <input type="password" name="pin" class="form-control" placeholder="PIN" pattern="[0-9]*"
                    inputmode="numeric">
            </div>

            <button type="submit" class="btn btn-danger w-100">Authenticate</button>
        </form>

        <div class="mt-3">
            <a href="{{ url_for('pos.sales') }}" class="text-muted">← Back to Sales</a>
        </div>
    </div>
</body>

</html>
