<!DOCTYPE html>
<html>

<head>
    <title>RSCP | Hourly Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" href="{{ favicon }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #f1f5f9;
        }

        .header {
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            color: white;
            padding: 1.5rem 2rem;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    {% include '_nav.html' %}

    <div class="header">
        <h2>🕐 Hourly Analysis</h2>
        <small>Last {{ days }} days</small>
    </div>

    <div class="container-fluid p-4">
        <a href="{{ url_for('pos.management') }}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

        <div class="row">
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5>Sales by Hour</h5>
                    <canvas id="hourlyChart" height="250"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5>Sales by Day of Week</h5>
                    <canvas id="dailyChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hourly Chart
        const hourlyLabels = {{ hourly| map(attribute = 'hour') | list | tojson }};
        const hourlyData = {{ hourly| map(attribute = 'revenue') | list | tojson }};

        new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {
                labels: hourlyLabels.map(h => h + ':00'),
                datasets: [{
                    label: 'Revenue',
                    data: hourlyData,
                    backgroundColor: '#2563eb'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v } } } }
        });

        // Daily Chart
        const dowNames = {{ dow_names| tojson }};
        const dailyLabels = {{ daily| map(attribute = 'dow') | list | tojson }};
        const dailyData = {{ daily| map(attribute = 'revenue') | list | tojson }};

        new Chart(document.getElementById('dailyChart'), {
            type: 'bar',
            data: {
                labels: dailyLabels.map(d => dowNames[parseInt(d)]),
                datasets: [{
                    label: 'Revenue',
                    data: dailyData,
                    backgroundColor: '#7c3aed'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v } } } }
        });
    </script>
</body>

</html>
