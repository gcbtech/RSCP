<!DOCTYPE html>
<html>

<head>
    <title>RSCP | Export Timesheets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css">
    <link rel="icon" href="{{ favicon }}">
</head>

<body class="bg-light">
    {% include '_nav.html' %}

    <div class="container mt-5" style="max-width: 700px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">📊 Export Timesheets</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('timeclock.export_report') }}" method="POST" target="_blank">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Staff Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Staff Members</label>
                        <select id="userSelect" name="user_ids" multiple placeholder="Select employees..."
                            autocomplete="off">
                            {% for u in users %}
                            <option value="{{ u.id }}" selected>{{ u.username }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">Leave all selected to export everyone.</div>
                    </div>

                    <!-- Period Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Pay Period / Date Range</label>
                        <select name="period" id="periodSelect" class="form-select mb-2" onchange="toggleCustomDates()">
                            {% for p in periods %}
                            <option value="{{ p.start }}|{{ p.end }}">{{ p.label }}</option>
                            {% endfor %}
                            <option value="custom">Custom Date Range...</option>
                        </select>

                        <div id="customDates" class="row g-2" style="display: none;">
                            <div class="col-6">
                                <label class="form-label small">Start Date</label>
                                <input type="date" name="custom_start" class="form-control">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">End Date</label>
                                <input type="date" name="custom_end" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Generate Report (Print/PDF)</button>
                        <a href="{{ url_for('timeclock.manager_dashboard') }}" class="btn btn-outline-secondary">Back to
                            Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script>
        new TomSelect('#userSelect', {
            plugins: ['remove_button'],
            create: false
        });

        function toggleCustomDates() {
            const val = document.getElementById('periodSelect').value;
            const customDiv = document.getElementById('customDates');
            const inputs = customDiv.querySelectorAll('input');

            if (val === 'custom') {
                customDiv.style.display = 'flex';
                inputs.forEach(i => i.required = true);
            } else {
                customDiv.style.display = 'none';
                inputs.forEach(i => i.required = false);
            }
        }
    </script>
</body>

</html>
